name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint index.html
        run: htmlhint index.html
